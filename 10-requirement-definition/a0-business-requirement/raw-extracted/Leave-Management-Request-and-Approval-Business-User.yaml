overview:
  sheet_title: "Leave Management Request and Approval - Business User View"
  document_summary:
    document_title: "Leave Management Request and Approval"
    perspective: "Business User / HR Operations"
    business_goal: "ลดความล่าช้าในการขอลาและอนุมัติ พร้อมให้พนักงานทุกประเภทใช้งานระบบเดียวกันผ่าน Web"
    scope: "ครอบคลุมการตรวจสอบสิทธิ์วันลา การยื่นคำขอลา การอนุมัติ การแจ้งผล และการจัดเก็บข้อมูลเข้าฝ่าย HR"
    target_users:
      - "พนักงานประจำ"
      - "พนักงาน Outsource"
      - "หัวหน้างาน"
      - "HR"
    expected_outcome: "ลดงาน manual และ Excel นอกระบบ เพิ่มความโปร่งใส ตรวจสอบสถานะได้ทันที"
  business_context:
    - "ปัจจุบันระบบ HRIS เปิดใช้งานได้เฉพาะฝ่าย HR ทำให้พนักงานทั่วไปและหัวหน้างานไม่สามารถทำรายการลาได้ด้วยตนเอง"
    - "กระบวนการขอลาและอนุมัติจึงเกิดความล่าช้า เพราะต้องประสานงานผ่าน HR หรือใช้เอกสาร/ไฟล์ Excel นอกระบบ"
    - "พนักงาน Outsource ไม่อยู่ในระบบ HRIS เดิม ส่งผลให้ HR ต้องควบคุมข้อมูลการลาเพิ่มเติมผ่าน Excel ซึ่งมีความเสี่ยงเรื่องข้อมูลตกหล่น"
    - "ฝ่าย HR ต้องการระบบ Web กลางที่ให้พนักงานทุกคนเข้าดูวันลาคงเหลือ ยื่นขอลา และให้หัวหน้างานอนุมัติผ่านระบบได้ทันที"
    - "ระบบใหม่ต้องมี Email แจ้งผลเมื่อคำขอได้รับการอนุมัติหรือถูกปฏิเสธ เพื่อให้พนักงานรับทราบอย่างรวดเร็ว"
  success_criteria:
    - "พนักงานทุกกลุ่มรวมถึง Outsource เข้าใช้งานระบบขอลาผ่าน Web ได้"
    - "หัวหน้างานสามารถอนุมัติหรือ Reject ผ่านระบบได้โดยไม่ต้องใช้ Excel หรือเอกสารกระดาษ"
    - "พนักงานสามารถตรวจสอบสิทธิ์วันลาคงเหลือได้ด้วยตนเองแบบ near real-time"
    - "มี Email แจ้งผลให้พนักงานทันทีเมื่อสถานะคำขอเปลี่ยนเป็น Approved หรือ Rejected"
    - "HR ลดงาน manual reconciliation และลดการควบคุมนอกระบบ"

as_is_to_be:
  sheet_title: "Current Issues and Target Process"
  items:
    - topic: "System Access"
      as_is: "มีเฉพาะ HR ที่เข้าใช้ HRIS ได้"
      impact: "พนักงานและหัวหน้างานทำรายการเองไม่ได้"
      to_be_requirement: "ต้องมี Web application สำหรับพนักงานทุกคนและหัวหน้างาน"
      business_benefit: "ลดการพึ่ง HR ในงานประจำวัน"
      priority: "High"
    - topic: "Outsource Employee"
      as_is: "พนักงาน Outsource ไม่อยู่ในระบบ HRIS"
      impact: "ต้องคุมข้อมูลนอกระบบด้วย Excel"
      to_be_requirement: "ต้องรองรับพนักงาน Outsource ในระบบเดียวกัน"
      business_benefit: "ข้อมูลรวมศูนย์และตรวจสอบย้อนหลังได้"
      priority: "High"
    - topic: "Leave Balance Inquiry"
      as_is: "พนักงานสอบถามสิทธิ์วันลาผ่าน HR"
      impact: "เสียเวลาและเกิดคอขวดที่ HR"
      to_be_requirement: "พนักงานต้องเห็นวันลาคงเหลือด้วยตนเอง"
      business_benefit: "ลดงานตอบคำถามซ้ำและเพิ่มความโปร่งใส"
      priority: "High"
    - topic: "Leave Request"
      as_is: "ใช้การแจ้งผ่านคนกลางหรือฟอร์ม manual"
      impact: "เกิดความล่าช้าและข้อมูลไม่ครบ"
      to_be_requirement: "พนักงานกรอกคำขอลาในระบบโดยตรง"
      business_benefit: "ลดข้อมูลสูญหายและเพิ่มความถูกต้อง"
      priority: "High"
    - topic: "Approval Process"
      as_is: "หัวหน้างานอนุมัตินอกระบบ"
      impact: "ติดตามสถานะยาก"
      to_be_requirement: "หัวหน้างาน approve/reject ผ่านระบบ"
      business_benefit: "มีสถานะชัดเจนและตรวจสอบได้"
      priority: "High"
    - topic: "Notification"
      as_is: "พนักงานต้องคอยถามผลเอง"
      impact: "สื่อสารล่าช้าและเกิด misunderstanding"
      to_be_requirement: "ต้องมี Email แจ้งผลอัตโนมัติ"
      business_benefit: "ผู้ใช้งานรับรู้สถานะทันที"
      priority: "Medium"
    - topic: "HR Monitoring"
      as_is: "HR ต้องรวมข้อมูลจากหลายช่องทาง"
      impact: "เสี่ยงข้อมูลตกหล่นและผิดพลาด"
      to_be_requirement: "HR ต้องเห็นคำขอและประวัติการลาในระบบเดียว"
      business_benefit: "ลดงาน reconciliation และรองรับ audit"
      priority: "High"

business_requirements:
  sheet_title: "Business Requirements"
  items:
    - req_id: "BR-001"
      category: "Access"
      actor: "Employee"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "พนักงานทุกคนรวมถึง Outsource ต้องสามารถ Login เข้าใช้งานผ่าน Web ได้"
      expected_output: "เข้าถึงระบบได้ตามสิทธิ์"
      remark: "อาจเชื่อมกับ employee master หรือ user import"
    - req_id: "BR-002"
      category: "Leave Balance"
      actor: "Employee"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "พนักงานต้องเห็นสิทธิ์วันลาคงเหลือแยกตามประเภทการลา"
      expected_output: "หน้าจอ leave balance"
      remark: "แสดงยอดคงเหลือก่อนยื่นลา"
    - req_id: "BR-003"
      category: "Leave Request"
      actor: "Employee"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "พนักงานต้องยื่นคำขอลาผ่านระบบได้ โดยระบุประเภทการลา วันที่ และเหตุผล"
      expected_output: "Leave request record"
      remark: "รองรับแนบเอกสารกรณีลาป่วย"
    - req_id: "BR-004"
      category: "Approval"
      actor: "Manager"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "หัวหน้างานต้องอนุมัติหรือ Reject คำขอลาผ่านระบบได้"
      expected_output: "Approval status"
      remark: "ควรเห็นประวัติการลาและสิทธิ์คงเหลือประกอบการตัดสินใจ"
    - req_id: "BR-005"
      category: "Notification"
      actor: "System"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "ระบบต้องส่ง Email แจ้งพนักงานเมื่อคำขอถูกอนุมัติหรือถูก Reject"
      expected_output: "Email notification"
      remark: "แจ้งทั้งพนักงานและผู้เกี่ยวข้อง"
    - req_id: "BR-006"
      category: "Status Tracking"
      actor: "Employee"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "พนักงานต้องตรวจสอบสถานะคำขอลาได้ เช่น Pending, Approved, Rejected"
      expected_output: "Request status"
      remark: "ช่วยลดการสอบถามผ่าน HR"
    - req_id: "BR-007"
      category: "HR Monitoring"
      actor: "HR"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "HR ต้องเห็นรายการคำขอทั้งหมดและสถานะเพื่อใช้ติดตามงาน"
      expected_output: "Monitoring screen / report"
      remark: "ใช้แทน Excel control"
    - req_id: "BR-008"
      category: "Outsource Handling"
      actor: "HR"
      priority: "High"
      phase: "Phase 1"
      business_requirement: "ระบบต้องรองรับ employee type เพื่อแยกพนักงานประจำและ Outsource"
      expected_output: "Employee type data"
      remark: "ใช้สำหรับ filtering และ reporting"
    - req_id: "BR-009"
      category: "Audit Trail"
      actor: "HR / Audit"
      priority: "Medium"
      phase: "Phase 2"
      business_requirement: "ระบบต้องเก็บประวัติการสร้าง แก้ไข และอนุมัติคำขอลา"
      expected_output: "History log"
      remark: "รองรับการตรวจสอบย้อนหลัง"
    - req_id: "BR-010"
      category: "Reporting"
      actor: "HR"
      priority: "Medium"
      phase: "Phase 2"
      business_requirement: "HR ต้องสามารถ export รายงานการลาตามช่วงเวลา หน่วยงาน และประเภทพนักงานได้"
      expected_output: "Export file/report"
      remark: "ลดการรวบรวมข้อมูล manual"

workflow:
  sheet_title: "Leave Request and Approval Workflow"
  steps:
    - step: 1
      actor: "Employee"
      action: "Login ผ่าน Web"
      system_response: "ระบบตรวจสอบสิทธิ์การเข้าใช้งาน"
      output: "เข้าสู่หน้าหลัก"
      pain_point_solved: "ทุกคนเข้าระบบเดียวกันได้"
    - step: 2
      actor: "Employee"
      action: "ตรวจสอบวันลาคงเหลือ"
      system_response: "ระบบแสดง leave balance ตามประเภทการลา"
      output: "เห็นสิทธิ์คงเหลือ"
      pain_point_solved: "ลดการสอบถาม HR"
    - step: 3
      actor: "Employee"
      action: "ยื่นคำขอลา"
      system_response: "ระบบบันทึกคำขอและสถานะเป็น Pending"
      output: "Leave request created"
      pain_point_solved: "ลดการใช้ Excel/ฟอร์ม manual"
    - step: 4
      actor: "System"
      action: "แจ้งหัวหน้างาน"
      system_response: "ระบบส่งงานอนุมัติให้หัวหน้างาน"
      output: "Approval task"
      pain_point_solved: "ลดการประสานงานผ่านคนกลาง"
    - step: 5
      actor: "Manager"
      action: "Approve หรือ Reject"
      system_response: "ระบบอัปเดตสถานะคำขอ"
      output: "Approved/Rejected"
      pain_point_solved: "ติดตามผลได้ในระบบ"
    - step: 6
      actor: "System"
      action: "ส่ง Email แจ้งผล"
      system_response: "ระบบส่ง Email ไปยังพนักงานทันที"
      output: "Notification sent"
      pain_point_solved: "พนักงานทราบผลโดยไม่ต้องตามงานเอง"
    - step: 7
      actor: "HR"
      action: "ติดตามและรายงาน"
      system_response: "HR ตรวจสอบข้อมูลการลาและ export report ได้"
      output: "Monitoring / report"
      pain_point_solved: "ลดการ control นอกระบบ"

business_rules:
  sheet_title: "Business Rules and Assumptions"
  rules:
    - rule_id: "RULE-001"
      business_rule_or_assumption: "พนักงานทุกคนต้องมี account สำหรับเข้าใช้งานระบบ ไม่ว่าจะเป็นพนักงานประจำหรือ Outsource"
      reason: "เพื่อให้ระบบใหม่ครอบคลุมทุกกลุ่ม"
      owner: "HR / IT"
      priority: "High"
    - rule_id: "RULE-002"
      business_rule_or_assumption: "สิทธิ์วันลาคงเหลือต้องอ้างอิง master data ที่ HR ยืนยันแล้ว"
      reason: "ป้องกันความคลาดเคลื่อนของยอดวันลา"
      owner: "HR"
      priority: "High"
    - rule_id: "RULE-003"
      business_rule_or_assumption: "คำขอลาทุกคำขอต้องมีสถานะมาตรฐานอย่างน้อย Pending, Approved, Rejected"
      reason: "เพื่อให้ติดตามสถานะได้ชัดเจน"
      owner: "Business Owner"
      priority: "High"
    - rule_id: "RULE-004"
      business_rule_or_assumption: "ระบบต้องส่ง Email แจ้งผลเฉพาะเมื่อมีการอนุมัติหรือปฏิเสธ"
      reason: "ลดการสื่อสารซ้ำซ้อนและทำให้พนักงานทราบผลทันที"
      owner: "Business Owner"
      priority: "High"
    - rule_id: "RULE-005"
      business_rule_or_assumption: "หัวหน้างานที่ได้รับมอบหมายต้องเป็น approver หลักของคำขอลา"
      reason: "ให้การอนุมัติตรงตามสายงาน"
      owner: "HR / Line Manager"
      priority: "High"
    - rule_id: "RULE-006"
      business_rule_or_assumption: "HR ต้องสามารถค้นหาและ export ข้อมูลการลาได้"
      reason: "รองรับการตรวจสอบและสรุปรายงาน"
      owner: "HR"
      priority: "Medium"
  out_of_scope:
    title: "Out of Scope for Initial Discussion"
    items:
      - "การคำนวณ OT หรือ payroll integration เชิงลึก"
      - "Mobile application native หาก Web responsive เพียงพอต่อการใช้งาน"
      - "Multi-level approval ที่ซับซ้อนเกิน 1 ระดับ หากยังไม่มี business rule ชัดเจน"

user_stories:
  sheet_title: "Key User Stories"
  stories:
    - story_id: "US-001"
      as_a: "Employee"
      i_want_to: "ตรวจสอบวันลาคงเหลือผ่าน Web"
      so_that: "วางแผนการลาได้ด้วยตนเอง"
      priority: "High"
    - story_id: "US-002"
      as_a: "Employee"
      i_want_to: "ยื่นคำขอลาโดยไม่ต้องส่งไฟล์ Excel หรือเอกสารกระดาษ"
      so_that: "ลดเวลาการประสานงาน"
      priority: "High"
    - story_id: "US-003"
      as_a: "Manager"
      i_want_to: "อนุมัติหรือ Reject คำขอลาผ่านระบบ"
      so_that: "จัดการทีมได้เร็วขึ้น"
      priority: "High"
    - story_id: "US-004"
      as_a: "Outsource Employee"
      i_want_to: "เข้าใช้งานระบบเดียวกับพนักงานทั่วไป"
