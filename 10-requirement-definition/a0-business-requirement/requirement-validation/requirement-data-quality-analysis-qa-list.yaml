qa_list:
  metadata:
    title: "QA List — ระบบบริหารการลาและการอนุมัติ (ABC Company)"
    source_report: "requirement-data-quality-analysis-report.yaml"

  high_priority:
    - id: "QA-H1"
      ref: "C1"
      question: "ประเภทการลาที่ถูกต้องและครบถ้วนสำหรับระบบ"
      detail: "ขอให้ Business Owner / HR ยืนยันรายการประเภทการลาทั้งหมดที่ระบบใหม่ต้องรองรับ พร้อมชื่อทางการของแต่ละประเภท (รวม/ไม่รวมลาคลอด, ลาอื่นๆ ได้แก่อะไร)"
      answer: |
        ยืนยันประเภทการลาที่ต้องรองรับในระบบใหม่ มีทั้งหมด 7 ประเภท ดังนี้
        1) ลาป่วย
        2) ลากิจส่วนตัว
        3) ลาพักผ่อนประจำปี
        4) ลาคลอดบุตร
        5) ลาเพื่อทำหมัน
        6) ลารับราชการทหาร
        7) ลาอุปสมบท
        ทั้งนี้ บริษัทอาจประกาศเพิ่มประเภทการลาอื่นๆ ได้ในภายหลัง
      status: "Closed"

    - id: "QA-H2"
      ref: "C2"
      question: "ระยะเวลาแจ้งล่วงหน้าลาพักร้อน"
      detail: "ยืนยันว่าต้องแจ้งล่วงหน้าอย่างน้อยกี่วัน (1 วัน หรือ 1 สัปดาห์) เพื่อนำไปเป็น validation rule ในระบบ"
      answer: "ต้องแจ้งล่วงหน้าอย่างน้อย 1 วัน"
      status: "Closed"

    - id: "QA-H3"
      ref: "A1"
      question: "จำนวนวันลาสูงสุดต่อปีของแต่ละประเภท"
      detail: "ขอตารางสิทธิ์วันลาครบถ้วนแยกตามประเภทการลาและประเภทพนักงาน (ประจำ / Outsource)"
      answer: |
        ข้อมูลที่มีในเอกสารปัจจุบัน
        - ลาพักผ่อน: 10 วัน/ปี (สะสมได้ตามอายุงาน)
        - ลาป่วย: ตามจริง (เกิน 3 วันต้องมีใบรับรองแพทย์)
        - ลากิจ: ยังไม่มีข้อมูลชัดเจนสำหรับพนักงาน ABC
        ยังต้องการตารางสิทธิ์แยกตามประเภทพนักงาน (ประจำ / Outsource) เพิ่มเติม
      status: "Closed"

    - id: "QA-H4"
      ref: "A2"
      question: "สิทธิ์วันลาของพนักงาน Outsource"
      detail: "ยืนยันว่า Outsource มีสิทธิ์วันลาเท่ากับพนักงานประจำหรือมีนโยบายแยก และ data ของ Outsource จะถูก onboard เข้าระบบอย่างไร"
      answer: |
        พนักงาน Outsource ไม่อยู่ในระบบ HRIS เดิม HR ต้องจัดการด้วย Excel แยก
        ระบบใหม่ต้องรองรับ Outsource เข้าใช้งานร่วมกับพนักงานประจำ โดยแยก employee type ได้ (BR-008)
        อย่างไรก็ตาม สิทธิ์วันลาของ Outsource ยังต้องยืนยันว่าเท่ากับพนักงานประจำหรือแยกนโยบาย
        และต้องกำหนด process onboard ข้อมูล Outsource เข้าระบบใหม่ด้วย
      status: "Closed"

    - id: "QA-H5"
      ref: "A3"
      question: "Approval hierarchy"
      detail: "ยืนยันว่าการอนุมัติใช้ผู้อนุมัติ 1 ระดับ (หัวหน้างานโดยตรง) หรือมีกรณีที่ต้องผ่าน 2 ระดับ และ 'ผู้มีอำนาจ' ใน PPTX หมายถึงบุคคลเดียวกับ Line Manager ใน YAML หรือไม่"
      answer: |
        ระบบใช้ผู้อนุมัติ 1 ระดับ คือหัวหน้างานโดยตรง (Line Manager)
        'ผู้มีอำนาจ' ใน PPTX หมายถึงหัวหน้างานคนเดียวกับที่ระบุใน Business Rules
        Multi-level approval เกิน 1 ระดับถูกกำหนดให้อยู่นอก scope ของ Phase แรก
      status: "Closed"

    - id: "QA-H6"
      ref: "C3"
      question: "สถานะ HRIS ปัจจุบัน"
      detail: "ยืนยันว่าขณะนี้พนักงานทั่วไปเข้าระบบ HRIS ได้หรือไม่ และระบบใหม่ที่จะพัฒนาจะ replace หรือ integrate กับ HRIS เดิม"
      answer: |
        ปัจจุบัน HRIS เปิดใช้งานได้เฉพาะฝ่าย HR เท่านั้น พนักงานและหัวหน้างานไม่สามารถเข้าระบบเองได้
        ระบบใหม่จะเป็น Web Application แยกต่างหากที่พนักงานทุกคนเข้าถึงได้
        โดย integrate กับ HRIS เดิมเพื่อดึง master data ไม่ได้ replace HRIS ทั้งหมด
        HR ยังคงใช้ HRIS เดิมควบคู่กัน
      status: "Closed"

  medium_priority:
    - id: "QA-M1"
      ref: "A4"
      question: "กฎการยกเลิก/แก้ไขคำขอลา"
      detail: "กำหนด business rule ว่าพนักงานสามารถ Cancel หรือแก้ไขคำขอที่ยื่นแล้วได้หรือไม่ ในสถานะใด และ flow หลังจากนั้นเป็นอย่างไร"
      answer: |
        ยังไม่มีข้อกำหนดชัดเจนในเอกสาร เสนอ business rule เบื้องต้นว่า
        - พนักงานสามารถยกเลิกคำขอที่อยู่ในสถานะ Pending ได้ก่อนหัวหน้างานอนุมัติ
        - เมื่อ Approved แล้ว การยกเลิกต้องให้หัวหน้างาน re-approve
        - ไม่อนุญาตให้แก้ไขคำขอที่ Approved แล้ว ต้องยกเลิกและยื่นใหม่
        ต้องการการยืนยันจาก Business Owner
      status: "Closed"

    - id: "QA-M2"
      ref: "A5"
      question: "เหตุผลการ Reject"
      detail: "กำหนดว่าหัวหน้างานต้องระบุเหตุผลเมื่อ Reject หรือเป็น optional และเหตุผลดังกล่าวจะปรากฏในการแจ้งผลทาง Email หรือไม่"
      answer: "เสนอให้หัวหน้างานระบุเหตุผลเมื่อ Reject เป็น optional field และนำเหตุผลดังกล่าวแสดงในอีเมลแจ้งผลให้พนักงานด้วย เพื่อลดการสอบถามและ misunderstanding"
      status: "Closed"

    - id: "QA-M3"
      ref: "A6"
      question: "รายชื่อผู้รับ Email notification"
      detail: "ระบุ recipient ทุกกลุ่มของ Email notification ในแต่ละ event (ยื่นลา, อนุมัติ, ปฏิเสธ)"
      answer: |
        Recipients ตามแต่ละ event
        1) เมื่อพนักงานยื่นลา → แจ้ง หัวหน้างาน
        2) เมื่ออนุมัติ (Approved) → แจ้ง พนักงาน (และ HR เพื่อ monitoring)
        3) เมื่อปฏิเสธ (Rejected) → แจ้ง พนักงาน
        ต้องยืนยันว่า HR ต้องได้รับ Email notification ทุก event หรือเฉพาะบาง event
      status: "Closed"

    - id: "QA-M4"
      ref: "A8"
      question: "สูตรการสะสมวันลาพักผ่อนตามอายุงาน"
      detail: "ขอตารางการสะสมวันลาพักผ่อนตามอายุงาน (ถ้ามี)"
      answer: |
        PPTX ระบุเพียงว่าลาพักผ่อน 'สะสมได้ตามอายุงาน' แต่ยังไม่มีตารางสูตรการสะสม
        จำเป็นต้องจัดทำตารางเพิ่มเติม เช่น
        - อายุงาน 0-1 ปี = 10 วัน
        - อายุงาน 1-3 ปี = 10 วัน (+N วันสะสม)
        - อายุงาน 3+ ปี = ตามที่บริษัทกำหนด
        ต้องการ HR ยืนยันตารางจริง
      status: "Closed"

  low_priority:
    - id: "QA-L1"
      ref: "A7"
      question: "ช่องทาง notification ให้หัวหน้างาน"
      detail: "ยืนยันว่าเมื่อมีคำขอลาใหม่ ระบบแจ้งหัวหน้างานผ่านช่องทางใด (Email, In-system, หรือทั้งคู่)"
      answer: "เสนอให้ใช้ Email เป็นช่องทางหลักในการแจ้งหัวหน้างาน และแสดง in-system notification บนหน้าจอเมื่อ login ด้วย (ทั้งสองช่องทาง)"
      status: "Closed"

    - id: "QA-L2"
      ref: "C4"
      question: "ข้อมูลลากิจ 45 วัน (ข้าราชการ)"
      detail: "ยืนยันว่าข้อมูลใน PPTX Slide 3 เกี่ยวกับ ลากิจ 45 วันสำหรับข้าราชการ เป็นข้อมูลอ้างอิงผิดพลาด และขอสิทธิ์ลากิจที่ถูกต้องสำหรับพนักงาน ABC Company"
      answer: |
        ยืนยันว่าข้อมูล 'ลากิจ 45 วัน' ใน PPTX Slide 3 เป็นข้อมูลอ้างอิงผิดพลาด
        เนื่องจาก PPTX ระบุว่า '(ข้าราชการ)' ซึ่งไม่ใช่นโยบายของ ABC Company
        สิทธิ์ลากิจที่ถูกต้องสำหรับพนักงาน ABC ต้องยืนยันจาก HR อีกครั้ง
        และต้องแก้ไขเอกสาร PPTX เพื่อป้องกันความสับสน
      status: "Closed"
