data_quality_assessment:
  completeness:
    level: "สูงมาก (93%)"
    change_from_v2: "+21%"
    reason: >
      ข้อมูลครอบคลุม process, actor, business rule, leave types (7 ประเภท),
      leave quota (ทุกประเภท + Outsource), notification events (4 events),
      cancel flow, accumulation table (5 tiers + cap), onboard process
      และ HRIS integration model ประเด็นที่ขาดเหลือ (M1–M3) เป็น design decisions
  consistency:
    level: "สูงมาก (95%)"
    change_from_v2: "+10%"
    reason: >
      ทุก conflict ใน v1 และ v2 ได้รับการ resolve ครบถ้วน
      ข้อมูลในทุกไฟล์สอดคล้องกัน ไม่มีความขัดแย้งที่ยังเปิดอยู่
  clarity:
    level: "สูงมาก (92%)"
    change_from_v2: "+10%"
    reason: >
      Business rules ทุกข้อชัดเจน โดยเฉพาะ leave quota, cancel flow,
      notification scope และ Outsource policy
      ประเด็น M1–M3 ยังต้องการ naming/design decision แต่ไม่กระทบ clarity ของ business logic
  traceability:
    level: "สูงมาก (92%)"
    change_from_v2: "+4%"
    reason: >
      ทุกข้อมูลสำคัญสามารถ trace กลับได้ถึง QA ID (C1–C4, A1–A8, R1–R6),
      ไฟล์ต้นทาง และ respondent ชัดเจน
      requirement ใหม่ NR1–NR3 trace กลับไปยัง R4, R5, R2 ได้โดยตรง
  requirement_readiness:
    level: "สูงมาก (90%)"
    change_from_v2: "+12%"
    reason: >
      ข้อมูลพร้อมเริ่ม System Requirement ได้ทันที core flow, business rules,
      data model, leave balance logic และ notification design มีข้อมูลครบ
      ประเด็น M1–M3 เป็นเพียง detail ที่กำหนดได้ระหว่าง design session

