  ambiguous_note: "Minor — ระดับ design decision เท่านั้น ไม่ต้องถาม Business Owner หรือ HR"
  new_requirements_found: 3
  readiness_level: "Ready"
  summary_opinion: >
    ข้อมูลพร้อมสำหรับการเริ่มจัดทำ System Requirement ได้ทันที
    ประเด็น minor ที่เหลือ 3 รายการสามารถตัดสินใจได้โดยทีม BA/SA ระหว่าง design session
    โดยไม่จำเป็นต้องรอคำตอบเพิ่มเติมจาก Business Owner หรือ HR Manager อีก

