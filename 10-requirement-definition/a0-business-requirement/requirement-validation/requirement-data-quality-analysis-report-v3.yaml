v2_answers_summary:
  - id: "R1"
    topic: "สิทธิ์วันลากิจ"
    answer_summary: "3 วัน/ปี ทั้งพนักงานประจำและ Outsource เท่ากัน"
  - id: "R2"
    topic: "สิทธิ์วันลา Outsource"
    answer_summary: >
      ลาป่วย/กิจ/พักผ่อน: เหมือนพนักงานประจำ
      ลาคลอดบุตร/ทำหมัน/รับราชการ/อุปสมบท: ไม่มีสิทธิ์ (ใช้จากบริษัทต้นสังกัด)
  - id: "R3"
    topic: "Onboard Outsource"
    answer_summary: "Import จาก Excel template — update ทุกต้นไตรมาส (7 fields บังคับ)"
  - id: "R4"
    topic: "Cancel/Edit rule"
    answer_summary: >
      Pending: ยกเลิกเองได้ทันที
      Approved: หัวหน้า re-approve ภายใน 1 วันทำการ
      Rejected: ยื่นใหม่ได้ทันที
      คืนวันลา auto เมื่อยกเลิก Approved
  - id: "R5"
    topic: "HR Email scope"
    answer_summary: "HR รับทุก event (ยื่น, Approve, Reject) + เพิ่ม event ใหม่: ยกเลิก Approved → แจ้ง HR"
  - id: "R6"
    topic: "ตารางสะสมวันลา"
    leave_accumulation_table:
      - tenure: "< 1 ปี"
        days_per_year: 0
        note: "ยังไม่มีสิทธิ์ ต้องผ่านทดลองงานก่อน"
      - tenure: "1–3 ปี"
        days_per_year: 10
      - tenure: "3–5 ปี"
        days_per_year: 12
      - tenure: "5–10 ปี"
        days_per_year: 15
      - tenure: "10+ ปี"
        days_per_year: 18
    max_carry_over_cap: 30
    tenure_start_rule: "นับจากวันเริ่มงานใน ABC (รวม Outsource)"

