data_quality_assessment:
  completeness:
    level: "ปานกลาง (60%)"
    reason: >
      ข้อมูลครอบคลุม happy path process และ business goal เป็นอย่างดี
      แต่ยังขาด business rule สำคัญ เช่น จำนวนวันลาต่อปี สิทธิ์ Outsource
      กฎการ Cancel/Edit สูตรการสะสมวันลา และรายละเอียด notification recipients
  consistency:
    level: "ต่ำ (40%)"
    reason: >
      มีความขัดแย้งระหว่างไฟล์ใน 4 ประเด็นสำคัญ ได้แก่ ระยะเวลาแจ้งล่วงหน้าลาพักร้อน (1 วัน vs 1 สัปดาห์)
      สถานะการเข้าถึง HRIS approval authority และข้อมูลลากิจข้าราชการ
      ซึ่งต้องได้รับการยืนยันก่อนออกแบบระบบ
  clarity:
    level: "ปานกลาง (65%)"
    reason: >
      ไฟล์ YAML ให้ข้อมูลที่ชัดเจนและมีโครงสร้างดีที่สุด
      ส่วนไฟล์ QA และ PPTX มีข้อมูลบางส่วนที่ต้องตีความหรือชี้แจงเพิ่มเติม
      โดยเฉพาะ actor และ approval level
  traceability:
    level: "สูง (85%)"
    reason: >
      ทุกไฟล์ระบุ source file อย่างชัดเจน และ YAML มี req_id และ rule_id ที่ทำให้ trace กลับได้ง่าย
      อย่างไรก็ตาม ไฟล์ PPTX และ QA ไม่มี structured reference
      ที่สามารถ link กลับไปยัง requirement แต่ละข้อได้โดยตรง
  requirement_readiness:
    level: "ปานกลาง (55%)"
    reason: >
      ข้อมูลเพียงพอสำหรับการทำ System Requirement ในส่วน access leave request creation
      approval flow และ notification ในระดับ high-level แต่ยังไม่พร้อมสำหรับการออกแบบ data model
      และ business rule โดยละเอียด จนกว่าจะได้รับคำตอบจาก QA List ระดับ High Priority

final_verdict:
  status: "Partially Ready"
  main_reasons:
    - "ข้อมูลมีความครบถ้วนในระดับ process และ actor สำหรับ core flow (Employee ยื่น → Manager อนุมัติ → Email แจ้งผล → HR ติดตาม)"
