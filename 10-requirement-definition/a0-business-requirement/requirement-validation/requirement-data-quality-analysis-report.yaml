executive_summary:
  total_files_analyzed: 5
  overview: >
    เอกสารครอบคลุมหลากหลายมุมมอง ได้แก่ แบบฟอร์มการลา ระเบียบ HR บทสนทนา QA
    Business Requirement และ Presentation ซึ่งให้บริบทที่กว้างขึ้น แต่มีความไม่สอดคล้องกัน
    ในหลายจุดที่ต้องยืนยันก่อนเริ่มทำ System Requirement
  duplicated_issues_count: 3
  conflicting_issues_count: 4
  ambiguous_issues_count: 8
  readiness_level: "Partially Ready"
  summary_opinion: >
    ข้อมูลมีเนื้อหาเพียงพอในระดับหนึ่งสำหรับ happy path ของ process การขอลา
    แต่ยังขาดรายละเอียดสำคัญที่ส่งผลโดยตรงต่อ business rule เช่น จำนวนวันลาต่อปีแต่ละประเภท
    เงื่อนไขของพนักงาน Outsource Multi-level approval
    และมีข้อขัดแย้งระหว่างไฟล์ที่ต้องได้รับการยืนยันจาก Business Owner ก่อนดำเนินการต่อ

