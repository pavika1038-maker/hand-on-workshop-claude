      question: "ประเภทการลาที่ถูกต้องและครบถ้วนสำหรับระบบ"
      detail: "ขอให้ Business Owner / HR ยืนยันรายการประเภทการลาทั้งหมดที่ระบบใหม่ต้องรองรับ พร้อมชื่อทางการของแต่ละประเภท (รวม/ไม่รวมลาคลอด, ลาอื่นๆ ได้แก่อะไร)"
    - id: "QA-H2"
      ref: "C2"
      question: "ระยะเวลาแจ้งล่วงหน้าลาพักร้อน"
      detail: "ยืนยันว่าต้องแจ้งล่วงหน้าอย่างน้อยกี่วัน (1 วัน หรือ 1 สัปดาห์) เพื่อนำไปเป็น validation rule ในระบบ"
    - id: "QA-H3"
      ref: "A1"
      question: "จำนวนวันลาสูงสุดต่อปีของแต่ละประเภท"
      detail: "ขอตารางสิทธิ์วันลาครบถ้วนแยกตามประเภทการลาและประเภทพนักงาน (ประจำ / Outsource)"
    - id: "QA-H4"
      ref: "A2"
      question: "สิทธิ์วันลาของพนักงาน Outsource"
      detail: "ยืนยันว่า Outsource มีสิทธิ์วันลาเท่ากับพนักงานประจำหรือมีนโยบายแยก และ data ของ Outsource จะถูก onboard เข้าระบบอย่างไร"
    - id: "QA-H5"
      ref: "A3"
      question: "Approval hierarchy"
      detail: "ยืนยันว่าการอนุมัติใช้ผู้อนุมัติ 1 ระดับ (หัวหน้างานโดยตรง) หรือมีกรณีที่ต้องผ่าน 2 ระดับ และ 'ผู้มีอำนาจ' ใน PPTX หมายถึงบุคคลเดียวกับ Line Manager ใน YAML หรือไม่"
    - id: "QA-H6"
      ref: "C3"
      question: "สถานะ HRIS ปัจจุบัน"
      detail: "ยืนยันว่าขณะนี้พนักงานทั่วไปเข้าระบบ HRIS ได้หรือไม่ และระบบใหม่ที่จะพัฒนาจะ replace หรือ integrate กับ HRIS เดิม"
  medium_priority:
    - id: "QA-M1"
      ref: "A4"
      question: "กฎการยกเลิก/แก้ไขคำขอลา"
      detail: "กำหนด business rule ว่าพนักงานสามารถ Cancel หรือแก้ไขคำขอที่ยื่นแล้วได้หรือไม่ ในสถานะใด และ flow หลังจากนั้นเป็นอย่างไร"
    - id: "QA-M2"
