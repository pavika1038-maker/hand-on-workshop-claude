executive_summary:
  total_files_analyzed: 6
  overview: >
    หลังได้รับคำตอบจาก Business User ครบทั้ง 12 รายการ ประเด็นขัดแย้งหลัก 3 ใน 4 รายการ
    ได้รับการ resolve แล้ว และประเด็นไม่ชัดเจนได้รับการตอบบางส่วน ทำให้ข้อมูลมีความพร้อม
    สูงขึ้นอย่างมีนัยสำคัญสำหรับ core flow แต่ยังคงมีประเด็นที่ต้องขอข้อมูลเพิ่มเติม
    5 รายการก่อนออกแบบ data model ขั้นสมบูรณ์
  fully_resolved_count: 6
  partially_resolved_count: 6
  remaining_open_items_count: 6
  readiness_level: "Partially Ready"
  summary_opinion: >
    ข้อมูลพร้อมเพียงพอสำหรับการออกแบบ System Requirement ในส่วน core flow
    (access, leave request, approval, notification, HR monitoring)
    แต่ยังต้องการข้อมูลเพิ่มเติมในส่วน leave quota ของลากิจและ Outsource,
    cancel/edit business rule, และตารางสะสมวันลาก่อนออกแบบ data model ขั้นสมบูรณ์

