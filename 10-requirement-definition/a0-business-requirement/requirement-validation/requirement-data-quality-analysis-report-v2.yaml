open_items:
  description: "ประเด็นที่ยังต้องดำเนินการต่อหลังจากได้รับคำตอบ v1 QA ครบแล้ว"
  items:
    - id: "R1"
      topic: "สิทธิ์วันลากิจ (จำนวนวัน/ปี) สำหรับพนักงาน ABC Company"
      missing_info: "HR ต้องยืนยันตัวเลขที่ถูกต้อง แยกตามประเภทพนักงาน (ประจำ / Outsource)"
      impact: "สูง — กระทบ leave quota data model และ validation rule"
      priority: "High"
    - id: "R2"
      topic: "นโยบายสิทธิ์วันลาของพนักงาน Outsource"
      missing_info: "HR ต้องยืนยันว่าสิทธิ์เท่ากับพนักงานประจำหรือมีตารางแยก"
      impact: "สูง — กระทบ leave balance calculation แยกตาม employee type"
      priority: "High"
    - id: "R3"
      topic: "Process onboard ข้อมูล Outsource เข้าระบบใหม่"
      missing_info: "HR/IT ต้องกำหนด flow (manual input, import file, หรือ API)"
      impact: "กลาง — กระทบ initial data migration และ user management"
