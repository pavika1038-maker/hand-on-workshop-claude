      missing_info: "HR ต้องให้ตารางที่ได้รับอนุมัติแล้ว พร้อมเกณฑ์อายุงาน"
      impact: "กลาง — กระทบ leave balance calculation logic"
      priority: "Medium"

data_quality_assessment:
  completeness:
    level: "ปานกลาง-สูง (72%)"
    change_from_v1: "+12%"
    reason: >
      ได้รับข้อมูลประเภทการลาครบ 7 ประเภท, approval model ชัดเจน,
      notification channel และ reject rule กำหนดแล้ว
      ยังขาดข้อมูลสิทธิ์วันลากิจ, สิทธิ์ Outsource, ตารางสะสมวันลา และ cancel flow ที่ได้รับการยืนยัน
  consistency:
    level: "สูง (85%)"
    change_from_v1: "+45%"
    reason: >
      ความขัดแย้ง 3 ใน 4 รายการ (C1, C2, C3) ได้รับการ resolve อย่างชัดเจน
      C4 ยืนยันว่าเป็นข้อมูลผิดพลาดแล้ว แต่ยังขาดข้อมูลที่ถูกต้องมาแทนที่
  clarity:
    level: "สูง (82%)"
    change_from_v1: "+17%"
    reason: >
      ขอบเขตระบบ, approval model, notification flow และประเภทการลาชัดเจนมากขึ้น
      ยังมีความไม่ชัดในเรื่อง quota ของลากิจและ Outsource policy
  traceability:
    level: "สูง (88%)"
    change_from_v1: "+3%"
    reason: >
      คำตอบ QA ทุกรายการสามารถ trace กลับไปยัง QA ID ใน qa-list.yaml
      และ reference ID (C1, A3 ฯลฯ) ได้ชัดเจน
  requirement_readiness:
    level: "สูง (78%)"
    change_from_v1: "+23%"
    reason: >
      Core flow พร้อมสำหรับการออกแบบ System Requirement แล้ว
      ส่วนที่ยังขาดคือ business rule เชิง data (quota, accumulation)
      ซึ่งส่งผลต่อ data model แต่ไม่ blocking core feature

