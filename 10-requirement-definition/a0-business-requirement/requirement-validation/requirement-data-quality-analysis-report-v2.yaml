resolve_status:
  conflicting_information:
    - id: "C1"
      topic: "รายการประเภทการลา"
      status: "Resolved"
      answer_summary: >
        ยืนยัน 7 ประเภท: ลาป่วย, ลากิจส่วนตัว, ลาพักผ่อนประจำปี, ลาคลอดบุตร,
        ลาเพื่อทำหมัน, ลารับราชการทหาร, ลาอุปสมบท (เปิดรับเพิ่มได้ในอนาคต)
    - id: "C2"
      topic: "ระยะเวลาแจ้งล่วงหน้าลาพักร้อน"
      status: "Resolved"
      answer_summary: "ยืนยัน: ต้องแจ้งล่วงหน้าอย่างน้อย 1 วัน (ค่าจาก PPTX ถูกต้อง)"
    - id: "C3"
      topic: "สถานะการเข้าถึง HRIS ปัจจุบัน"
      status: "Resolved"
      answer_summary: >
        HRIS เปิดเฉพาะ HR เท่านั้น ระบบใหม่เป็น Web App แยก integrate กับ HRIS เดิม (ไม่ replace)
    - id: "C4"
      topic: "ข้อมูลลากิจ 45 วัน (ข้าราชการ)"
      status: "Partially Resolved"
      answer_summary: >
        ยืนยันว่าเป็นข้อมูลผิดพลาดจากกฎหมายราชการ
        แต่ยังไม่ได้รับสิทธิ์ลากิจที่ถูกต้องของ ABC

  ambiguous_or_incomplete:
    - id: "A1"
      topic: "จำนวนวันลาสูงสุดต่อปี"
      status: "Partially Resolved"
      answer_summary: "ลาพักผ่อน 10 วัน/ปี และลาป่วยตามจริงได้รับการยืนยัน แต่ลากิจยังไม่มีข้อมูล"
    - id: "A2"
      topic: "สิทธิ์วันลา Outsource"
      status: "Partially Resolved"
      answer_summary: "ยืนยันต้องรองรับ Outsource ในระบบเดียว แต่สิทธิ์วันลาและ onboard process ยังไม่ชัด"
    - id: "A3"
      topic: "Approval hierarchy"
      status: "Resolved"
      answer_summary: "1 ระดับ คือ Line Manager เท่านั้น Multi-level approval อยู่นอก Phase 1"
    - id: "A4"
      topic: "Cancel/Edit คำขอลา"
      status: "Partially Resolved"
      answer_summary: >
        มี proposed rules (Cancel สถานะ Pending ได้, Approved ต้อง re-approve, ไม่อนุญาต Edit หลัง Approve)
        แต่ยังต้องยืนยันจาก Business Owner
    - id: "A5"
      topic: "เหตุผลการ Reject"
      status: "Resolved"
      answer_summary: "Optional field และแสดงเหตุผลใน Email แจ้งผลให้พนักงาน"
    - id: "A6"
      topic: "ผู้รับ Email notification"
      status: "Partially Resolved"
      answer_summary: >
        Event mapping ชัดเจน (ยื่น→Manager, Approve→Employee+HR, Reject→Employee)
        แต่ scope HR ยังไม่ 100% (ทุก event หรือบาง event)
    - id: "A7"
      topic: "ช่องทาง notification Manager"
      status: "Resolved"
      answer_summary: "Email (หลัก) + In-system notification (เสริม) ทั้งสองช่องทาง"
    - id: "A8"
      topic: "ตารางสะสมวันลาพักผ่อน"
      status: "Partially Resolved"
      answer_summary: "มี proposed table แต่ยังต้องการ HR ยืนยันตารางที่ได้รับอนุมัติจริง"

