report:
  title: "Requirement Data Quality Analysis Report"
  version: "v2"
  project: "ระบบบริหารการลาและการอนุมัติ — ABC Company"
  analyzed_by: "Requirement Data Quality Analysis Agent"
  reference_v1: "requirement-data-quality-analysis-report.yaml"
